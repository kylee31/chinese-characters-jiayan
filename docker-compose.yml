services:
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
      target: runtime
    environment:
      CORS_ORIGINS: '["http://localhost:3000","https://chinese-characters-jiayan.vercel.app"]'
      JIAYAN_MODEL_DIR: /models/jiayan
      PORT: "8000"
    ports:
      - "8000:8000"
    volumes:
      - ./model_data/jiayan:/models/jiayan:ro
